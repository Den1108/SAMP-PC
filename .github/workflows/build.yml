name: Build Launcher

on:
  push:
    branches: [ "main", "master" ] # Сборка будет запускаться при пуше в эти ветки
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1. Получаем исходный код
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Устанавливаем .NET 8
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # 3. Восстановление зависимостей
      - name: Restore dependencies
        run: dotnet restore

      # 4. ПУБЛИКАЦИЯ (не просто Build)
      # Используем publish, чтобы создать Single File + Self-Contained
      - name: Publish Launcher
        run: >
          dotnet publish -c Release 
          -r win-x64 
          --self-contained true 
          -p:PublishSingleFile=true 
          -p:PublishReadyToRun=true 
          -o ./publish

      # 5. Загрузка артефакта
      # Теперь в архиве будет лежать только ОДИН файл FlytRP.exe
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlytRP-Launcher-Standalone
          # Указываем путь к папке, куда мы сделали Publish
          path: ./publish/FlytRP.exe
